<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Para Ti Alexia 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;font-family:'Playfair Display',serif}

/* PANTALLA PREGUNTA */
#screen-ask{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a0a0a 0%,#0a0000 100%);
  color:#ffd6d6;text-align:center;padding:20px;
  transition:opacity .8s ease;
}
#screen-ask h1{font-family:'Great Vibes',cursive;font-size:clamp(2.2rem,8vw,4rem);margin-bottom:30px;text-shadow:0 0 30px rgba(255,80,80,.5)}
#screen-ask .buttons{display:flex;gap:20px}
#screen-ask button{
  font-family:'Great Vibes',cursive;font-size:1.6rem;
  padding:14px 44px;border:2px solid #ff6b6b;border-radius:50px;
  background:transparent;color:#ffd6d6;cursor:pointer;
  transition:all .3s ease;
}
#screen-ask button:hover,#screen-ask button:active{background:#ff6b6b;color:#1a0a0a;transform:scale(1.08)}

/* PANTALLA MENTIROSA */
#screen-no{
  position:fixed;inset:0;z-index:100;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:#0a0000;color:#ff4444;text-align:center;padding:20px;
}
#screen-no h1{font-family:'Great Vibes',cursive;font-size:clamp(3rem,12vw,6rem);animation:shake .4s infinite;text-shadow:0 0 40px #ff0000}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}

/* PANTALLA PRINCIPAL */
#screen-main{
  position:fixed;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 50%,#2a0515 0%,#0d0208 60%,#000 100%);
  color:#ffe0ec;text-align:center;padding:20px;overflow:hidden;
}
#screen-main h1{
  font-family:'Great Vibes',cursive;font-size:clamp(2rem,7vw,3.8rem);
  opacity:0;transform:translateY(30px);
  animation:fadeUp 1.5s ease .5s forwards;
  text-shadow:0 0 25px rgba(255,100,150,.6);
  line-height:1.3;z-index:2;position:relative;
}
#screen-main p{
  font-family:'Great Vibes',cursive;font-size:clamp(1.3rem,4.5vw,2.2rem);
  opacity:0;animation:fadeUp 1.5s ease 1.5s forwards;
  margin-top:15px;color:#ffb3cc;z-index:2;position:relative;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ROSA CENTRAL */
.rose-container{z-index:2;position:relative;margin-bottom:20px;opacity:0;animation:fadeUp 1.5s ease .2s forwards}
.rose-svg{width:clamp(120px,35vw,200px);height:auto;filter:drop-shadow(0 0 30px rgba(255,50,80,.7))}

/* PÉTALOS CAYENDO */
.petal{
  position:fixed;z-index:1;opacity:0;pointer-events:none;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-60px) rotate(0deg) scale(1);opacity:0}
  10%{opacity:.9}
  90%{opacity:.7}
  100%{transform:translateY(110vh) rotate(720deg) scale(.5);opacity:0}
}

/* ORQUÍDEAS */
.orchid{
  position:fixed;z-index:1;opacity:0;pointer-events:none;
  animation:floatOrchid linear infinite;
}
@keyframes floatOrchid{
  0%{transform:translateY(-80px) rotate(0deg);opacity:0}
  10%{opacity:.85}
  90%{opacity:.6}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0}
}

/* BRILLOS */
.sparkle{
  position:fixed;width:4px;height:4px;background:#fff;border-radius:50%;
  z-index:3;pointer-events:none;opacity:0;
  animation:twinkle 2s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

/* CORAZONES FLOTANTES */
.heart-float{
  position:fixed;z-index:1;pointer-events:none;opacity:0;
  animation:heartRise 4s ease-in infinite;
  font-size:1.4rem;
}
@keyframes heartRise{
  0%{transform:translateY(0) scale(.5);opacity:0}
  20%{opacity:.8}
  100%{transform:translateY(-110vh) scale(1.2);opacity:0}
}
</style>
</head>
<body>

<!-- PREGUNTA -->
<div id="screen-ask">
  <h1>¿Alexia, eres tú? 🌹</h1>
  <div class="buttons">
    <button onclick="showMain()">Sí 💕</button>
    <button onclick="showNo()">No</button>
  </div>
</div>

<!-- MENTIROSA -->
<div id="screen-no">
  <h1>¡Mentirosa! 😤</h1>
</div>

<!-- PRINCIPAL -->
<div id="screen-main">
  <div class="rose-container">
    <svg class="rose-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="rg1" cx="50%" cy="40%"><stop offset="0%" stop-color="#ff3355"/><stop offset="100%" stop-color="#8b0020"/></radialGradient>
        <radialGradient id="rg2" cx="50%" cy="50%"><stop offset="0%" stop-color="#ff1a40"/><stop offset="100%" stop-color="#6b0018"/></radialGradient>
      </defs>
      <!-- tallo -->
      <path d="M100 150 Q95 190 98 250" stroke="#2d6b1e" stroke-width="4" fill="none"/>
      <path d="M98 200 Q70 185 60 170" stroke="#2d6b1e" stroke-width="2" fill="#3a8a2a" opacity=".8"/>
      <path d="M99 215 Q125 200 135 185" stroke="#2d6b1e" stroke-width="2" fill="#3a8a2a" opacity=".8"/>
      <!-- pétalos rosa -->
      <ellipse cx="100" cy="100" rx="42" ry="50" fill="url(#rg1)" opacity=".9"/>
      <ellipse cx="80" cy="95" rx="30" ry="40" fill="url(#rg2)" transform="rotate(-15 80 95)" opacity=".85"/>
      <ellipse cx="120" cy="95" rx="30" ry="40" fill="url(#rg2)" transform="rotate(15 120 95)" opacity=".85"/>
      <ellipse cx="100" cy="80" rx="25" ry="30" fill="#ff4466" opacity=".8"/>
      <ellipse cx="90" cy="85" rx="18" ry="25" fill="#ff2244" transform="rotate(-10 90 85)" opacity=".75"/>
      <ellipse cx="110" cy="85" rx="18" ry="25" fill="#ff2244" transform="rotate(10 110 85)" opacity=".75"/>
      <ellipse cx="100" cy="75" rx="12" ry="18" fill="#cc1133" opacity=".9"/>
    </svg>
  </div>
  <h1>Para ti, Alexia 🌹<br>una rosa</h1>
  <p>porque eres la más preciosa 💕</p>
  <audio id="music" loop></audio>
</div>

function showNo(){
  document.getElementById('screen-ask').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('screen-ask').style.display='none';
    document.getElementById('screen-no').style.display='flex';
  },800);
}

function showMain(){
  document.getElementById('screen-ask').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('screen-ask').style.display='none';
    document.getElementById('screen-main').style.display='flex';
    startEffects();
    playMusic();
  },800);
}

function playMusic(){
  const a=document.getElementById('music');
  a.src=AUDIO_SRC;
  a.volume=0.8;
  a.play().catch(()=>{
    document.addEventListener('touchstart',()=>a.play(),{once:true});
  });
}

function startEffects(){
  // Pétalos de rosa
  setInterval(()=>{
    const p=document.createElement('div');
    p.className='petal';
    p.innerHTML=pickRandom(['🌹','🥀','🌺','💐','🏵️']);
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=(12+Math.random()*20)+'px';
    p.style.animationDuration=(4+Math.random()*5)+'s';
    p.style.animationDelay=Math.random()*2+'s';
    document.getElementById('screen-main').appendChild(p);
    setTimeout(()=>p.remove(),12000);
  },300);

  // Orquídeas rojas
  setInterval(()=>{
    const o=document.createElement('div');
    o.className='orchid';
    o.innerHTML='🌺';
    o.style.left=Math.random()*100+'vw';
    o.style.fontSize=(18+Math.random()*18)+'px';
    o.style.animationDuration=(5+Math.random()*4)+'s';
    o.style.animationDelay=Math.random()*3+'s';
    document.getElementById('screen-main').appendChild(o);
    setTimeout(()=>o.remove(),14000);
  },700);

  // Brillitos
  for(let i=0;i<20;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*100+'vh';
    s.style.animationDelay=Math.random()*3+'s';
    s.style.width=s.style.height=(2+Math.random()*4)+'px';
    document.getElementById('screen-main').appendChild(s);
  }

  // Corazones flotantes
  setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart-float';
    h.innerHTML=pickRandom(['❤️','💕','💗','💖']);
    h.style.left=Math.random()*100+'vw';
    h.style.bottom='-30px';
    h.style.animationDelay=Math.random()+'s';
    document.getElementById('screen-main').appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },500);
}

function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)]}
